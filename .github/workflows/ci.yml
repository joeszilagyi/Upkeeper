name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-validation:
    name: Local validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Start with Ubuntu. Add macos-latest after GNU/BSD portability issues are
    # handled in the wrapper and validation harness.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            age \
            bash \
            coreutils \
            findutils \
            gawk \
            git \
            grep \
            jq \
            python3 \
            sed \
            zip

      - name: Classify change scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          docs_only=0
          scope_known=0
          changed_paths=()

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            mapfile -t changed_paths < <(git ls-files)
            scope_known=1
          else
            scope_known=1
            for scope_sha in "$base_sha" "$head_sha"; do
              [[ -n "$scope_sha" ]] || continue
              if ! git cat-file -e "$scope_sha^{commit}" 2>/dev/null; then
                if ! git fetch --no-tags --depth=1 origin "$scope_sha"; then
                  scope_known=0
                  break
                fi
              fi
            done
            if (( scope_known )); then
              mapfile -t changed_paths < <(git diff --name-only "$base_sha" "$head_sha")
            fi
          fi

          if (( scope_known )); then
            docs_only=1
            for path in "${changed_paths[@]}"; do
              [[ -n "$path" ]] || continue
              case "$path" in
                README.md|AGENTS.md|PLANS.md|change_notes_*.md|docs/*.md|docs/*/*.md|prompts/*.md)
                  ;;
                *)
                  docs_only=0
                  break
                  ;;
              esac
            done
          fi

          printf 'docs_only=%s\n' "$docs_only"
          printf 'docs_only=%s\n' "$docs_only" >>"$GITHUB_OUTPUT"

      - name: Shell syntax
        if: steps.scope.outputs.docs_only != '1'
        run: |
          bash -n Upkeeper
          bash -n FlameOn
          bash -n ChimneySweep
          bash -n Upkeeper.conf
          bash -n configurations/default.conf
          bash -n completions/*.bash
          bash -n lib/upkeeper/*.bash
          bash -n tools/*.sh
          bash -n tests/*.bash
          bash -n testruns/*.sh

      - name: Unit tests
        if: steps.scope.outputs.docs_only != '1'
        run: |
          for test_script in tests/*.bash; do
            bash "$test_script"
          done

      - name: Public docs
        run: tools/check_public_docs.sh --quick

      - name: Smoke validation
        if: steps.scope.outputs.docs_only == '1'
        run: tools/validate_upkeeper.sh --smoke

      - name: Quick validation
        if: steps.scope.outputs.docs_only != '1'
        run: tools/validate_upkeeper.sh --quick
