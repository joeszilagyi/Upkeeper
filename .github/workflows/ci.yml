name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-validation:
    name: Local validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Start with Ubuntu. Add macos-latest after GNU/BSD portability issues are
    # handled in the wrapper and validation harness.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bash \
            coreutils \
            findutils \
            gawk \
            git \
            grep \
            jq \
            python3 \
            sed \
            zip

      - name: Shell syntax
        run: |
          bash -n Upkeeper
          bash -n Upkeeper.conf
          bash -n configurations/default.conf
          bash -n lib/upkeeper/*.bash
          bash -n tools/*.sh
          bash -n tests/*.bash
          bash -n testruns/*.sh

      - name: Unit tests
        run: |
          for test_script in tests/*.bash; do
            bash "$test_script"
          done

      - name: Public docs
        run: tools/check_public_docs.sh --quick

      - name: Quick validation
        run: tools/validate_upkeeper.sh --quick
