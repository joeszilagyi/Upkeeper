name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-validation:
    name: Local validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Start with Ubuntu. Add macos-latest after GNU/BSD portability issues are
    # handled in the wrapper and validation harness.
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            age \
            bash \
            coreutils \
            findutils \
            gawk \
            git \
            grep \
            jq \
            python3 \
            sed \
            zip

      - name: Classify change scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          scope_args=(--classify-only)

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            scope_args+=(--base HEAD^1 --head HEAD)
          else
            base_sha="${{ github.event.before }}"
            if [[ "$base_sha" != "0000000000000000000000000000000000000000" ]]; then
              scope_args+=(--base "$base_sha" --head "${{ github.sha }}")
            fi
          fi

          if scope_output="$(tools/docs_only_fast_path.sh "${scope_args[@]}")"; then
            printf '%s\n' "$scope_output"
            printf '%s\n' "$scope_output" >>"$GITHUB_OUTPUT"
          else
            printf 'docs_only=0\n'
            printf 'scope_known=0\n'
            printf 'docs_only=0\n' >>"$GITHUB_OUTPUT"
            printf 'scope_known=0\n' >>"$GITHUB_OUTPUT"
          fi

      - name: Parallel local gates
        if: steps.scope.outputs.docs_only != '1'
        run: tools/run_validation_phases.sh --phases shell_syntax,unit_tests,public_docs,diff_whitespace

      - name: Docs-only fast path
        if: steps.scope.outputs.docs_only == '1'
        shell: bash
        run: |
          set -euo pipefail
          scope_args=(--validate)
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            scope_args+=(--base HEAD^1 --head HEAD)
          else
            base_sha="${{ github.event.before }}"
            if [[ "$base_sha" != "0000000000000000000000000000000000000000" ]]; then
              scope_args+=(--base "$base_sha" --head "${{ github.sha }}")
            fi
          fi
          tools/docs_only_fast_path.sh "${scope_args[@]}"

      - name: Full validation
        if: steps.scope.outputs.docs_only != '1'
        run: tools/validate_upkeeper.sh --full
