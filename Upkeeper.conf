# Upkeeper default configuration.
#
# This file is sourced by Bash before built-in defaults and before CLI parsing.
# Treat it as trusted executable shell code, not inert config data. Do not use
# config files from untrusted repositories or downloaded snippets. Keep it to
# shell-compatible assignments. One-cycle flags such as --target-file and
# --review-module still override values from this file for that invocation.
#
# The default file uses guarded assignments so exported environment variables
# keep working. Custom scheduled profiles may use direct assignments when the
# profile should win over the shell environment.

# Backend model and mode.
: "${CODEX_MODEL:=gpt-5.3-codex-spark}"
: "${CODEX_REASONING_EFFORT:=xhigh}"
: "${CODEX_MODE:=--sandbox workspace-write}"

# Basic operator display and local evidence.
: "${CODEX_TERMINAL_VERBOSITY:=basic}"
: "${CODEX_LOG_FILE:=$ROOT_DIR/Upkeeper.log}"
: "${CODEX_TRANSCRIPT_DIR:=$ROOT_DIR/runtime/upkeeper-transcripts}"
: "${CODEX_TRANSCRIPT_KEEP_HOURS:=24}"
: "${CODEX_TRANSCRIPT_KEEP_MAX_MB:=200}"

# Quota guardrails.
: "${CODEX_5H_STOP_PERCENT:=5}"
: "${CODEX_SPARK_5H_STOP_PERCENT:=0}"
: "${CODEX_WEEK_STOP_PERCENT:=15}"
: "${CODEX_WEEK_STOP_BUFFER_PERCENT:=0}"
: "${CODEX_SPARK_WEEK_STOP_BUFFER_PERCENT:=5}"
: "${CODEX_QUOTA_GUARDRAIL_BYPASS:=0}"
: "${CODEX_QUOTA_COOLDOWN_BYPASS:=0}"

# Fallback and postmortem behavior.
: "${CODEX_FALLBACK_ENABLED:=1}"
: "${CODEX_FALLBACK_MODEL:=gpt-5.5}"
: "${CODEX_FALLBACK_REASONING_EFFORT:=xhigh}"
: "${CODEX_FALLBACK_MODE:=$CODEX_MODE}"
: "${CODEX_FALLBACK_SCREEN_ENABLED:=1}"
: "${CODEX_POSTMORTEM_ENABLED:=1}"

# One-cycle task defaults. CLI flags override these for the invoked cycle.
: "${UPKEEPER_MODEL_OVERRIDE:=}"
: "${UPKEEPER_TARGET_FILE:=}"
: "${UPKEEPER_PROMPT_PASS:=}"
: "${UPKEEPER_PROMPT_FILE:=}"
: "${UPKEEPER_PROMPT:=}"
: "${UPKEEPER_PROMPT_TRUST_ROOT:=$ROOT_DIR/prompts}"
: "${UPKEEPER_ALLOW_EXTERNAL_PROMPT_FILE:=0}"
: "${UPKEEPER_REVIEW_MODULES:=}"
: "${UPKEEPER_IGNORE_FAILURE_QUEUE:=0}"
: "${UPKEEPER_BUG_REPORT_ONLY:=0}"
: "${UPKEEPER_FIX_NEXT_ISSUE:=0}"
: "${UPKEEPER_FIX_ISSUE:=}"
: "${UPKEEPER_ISSUE_WORKFLOW_STAGE:=}"
: "${UPKEEPER_ALLOW_PRIVATE_ISSUE_BODY_TO_MODEL:=0}"
: "${UPKEEPER_ISSUE_PRIORITY_LABELS:=security,data-integrity,bug}"
: "${UPKEEPER_ISSUE_SKIP_LABELS:=in-progress,blocked,duplicate,wontfix,invalid,needs-info,done,merged,has-pr}"

# Local target selection. The manifest is local runtime state, not source.
: "${UPKEEPER_SELECTION_SOURCE:=manifest}"
: "${UPKEEPER_SELECTION_ORDER:=oldest}"
: "${UPKEEPER_FILE_MANIFEST_MODE:=auto}"
: "${UPKEEPER_FILE_MANIFEST_PATH:=$ROOT_DIR/runtime/upkeeper-file-manifest.json}"
: "${UPKEEPER_IGNORE_FILE:=$ROOT_DIR/.upkeeperignore}"
: "${CODEX_FILE_MANIFEST_MAX_AGE_SECONDS:=300}"
: "${UPKEEPER_TARGET_ROOT:=}"
: "${UPKEEPER_TARGET_MAX_DEPTH:=}"
: "${UPKEEPER_INCLUDE_GLOBS:=}"
: "${UPKEEPER_EXCLUDE_GLOBS:=}"
: "${UPKEEPER_SELECTION_REVIEW_MODULES:=}"
: "${UPKEEPER_SELECTION_RANDOM_SEED:=}"
: "${UPKEEPER_MAX_COVER:=0}"

# Upkeeper Lattice local evidence ledger. The default DB is ignored runtime
# state and does not change the current source-safe target selector.
: "${UPKEEPER_LATTICE_ENABLED:=1}"
: "${UPKEEPER_LATTICE_REQUIRED:=0}"
: "${UPKEEPER_LATTICE_DB:=$ROOT_DIR/runtime/upkeeper-lattice/lattice.sqlite3}"
: "${UPKEEPER_LATTICE_SELECTION_MODE:=oldest-mtime}"
: "${UPKEEPER_LATTICE_RAW_STORAGE:=limited}"
: "${UPKEEPER_LATTICE_SQLITE_JOURNAL_MODE:=delete}"

# Selected-target pre-contact backups. The default vault is outside the repo.
# Plain mode is a recovery aid only; use an age recipient for encrypted content.
: "${UPKEEPER_PRECONTACT_BACKUP_ENABLED:=1}"
: "${UPKEEPER_PRECONTACT_BACKUP_REQUIRED:=1}"
: "${UPKEEPER_PRECONTACT_BACKUP_MODE:=auto}"
: "${UPKEEPER_PRECONTACT_BACKUP_REQUIRE_ENCRYPTED:=0}"
: "${UPKEEPER_PRECONTACT_BACKUP_ROOT:=${XDG_STATE_HOME:-$HOME/.local/state}/upkeeper/precontact-vault}"
: "${UPKEEPER_PRECONTACT_BACKUP_KEEP_PER_FILE:=20}"
: "${UPKEEPER_PRECONTACT_BACKUP_AGE_RECIPIENT:=}"
: "${UPKEEPER_PRECONTACT_BACKUP_REDACT_PATHS:=1}"
